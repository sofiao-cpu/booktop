<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>BookTop</title>
<link rel="stylesheet" href="style.css">

<style>
body {
margin: 0;
font-family: Arial;
}

.hero {
height: 100vh;
background: url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f') no-repeat center/cover;
display: flex;
align-items: center;
justify-content: center;
position: relative;
color: white;
text-align: center;
}

.overlay {
position: absolute;
width: 100%;
height: 100%;
background: rgba(0, 0, 80, 0.6);
top: 0;
left: 0;
pointer-events: none;
}

.hero-content {
position: relative;
z-index: 1;
}

.btn {
display: inline-block;
background: #5a6897;
color: white;
padding: 12px 25px;
border-radius: 6px;
text-decoration: none;
margin-top: 20px;
}

.btn:hover {
background: #44507a;
}
</style>
</head>

<body>

<section class="hero">

<div class="overlay"></div>

<div class="hero-content">
<h1 class="logo">BookTop </h1>

<p>Bem-vindo ao BookTop</p>
<p>Explore o mundo dos livros</p>

<a href="cadastro.html" class="btn">Criar Conta</a>
</div>

</section>

</body>
</html>
